name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static README page
        run: |
          npx --yes marked README.md > docs/README.rendered.html
          awk '
            /<!-- README_CONTENT -->/ {
              while ((getline line < "docs/README.rendered.html") > 0) print line;
              close("docs/README.rendered.html");
              next;
            }
            { print }
          ' docs/index.html > docs/index.built.html
          mv docs/index.built.html docs/index.html
          rm docs/README.rendered.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
